name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fontforge python3-fontforge jq unzip

      - name: Download NF glyph sources
        run: ./update.sh

      - name: Download upstream fonts
        run: ./download-upstream.sh

      - name: Build font
        run: ./build.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/LowGravitasSymbols.ttf
          generate_release_notes: true

      - name: Generate hub token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.HUB_APP_ID }}
          private-key: ${{ secrets.HUB_APP_PRIVATE_KEY }}
          owner: low-gravitas
          repositories: low-gravitas.github.io

      - name: Push assets to hub
        run: |
          curl -sX POST \
            -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/low-gravitas/low-gravitas.github.io/dispatches \
            -d '{"event_type":"update-symbol-font","client_payload":{"sha":"${{ github.sha }}","version":"${{ github.ref_name }}"}}'
