name: Deploy Glyph Browser to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fontforge python3-fontforge jq unzip

      - name: Download NF glyph sources
        run: ./update.sh

      - name: Download upstream fonts
        run: ./download-upstream.sh

      - name: Build font
        run: ./build.sh

      - name: Generate glyph manifest
        run: fontforge -script scripts/generate-manifest.py dist/LowGravitasSymbols.ttf site/glyphs.json

      - name: Prepare deploy directory
        run: |
          mkdir -p _site
          cp site/index.html _site/
          cp site/browser.html _site/
          cp site/symbols.css _site/
          cp site/index.css _site/
          cp site/browser.css _site/
          cp site/glyphs.json _site/
          cp site/low-gravitas-symbols.css _site/
          cp dist/LowGravitasSymbols.ttf _site/
          cp VERSION _site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
