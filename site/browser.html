<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Low Gravitas Symbols — Glyph Browser</title>
<style>
@font-face {
  font-family: 'LowGravitasSymbols';
  src: url('LowGravitasSymbols.ttf') format('truetype');
  font-display: swap;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
  --toast-text: #000;
  --shadow-alpha: 0.4;
  --glow: rgba(188, 140, 255, 0.5);
  --glyph-size: 28px;
  --card-size: 130px;
}

@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]) {
    --bg: #ffffff; --surface: #f6f8fa; --border: #d0d7de;
    --text: #1f2328; --text-dim: #656d76; --accent: #0969da;
    --accent-hover: #0550ae; --toast-text: #fff; --shadow-alpha: 0.15;
    --glow: rgba(130, 80, 223, 0.4);
  }
}
[data-theme="light"] {
  --bg: #ffffff; --surface: #f6f8fa; --border: #d0d7de;
  --text: #1f2328; --text-dim: #656d76; --accent: #0969da;
  --accent-hover: #0550ae; --toast-text: #fff; --shadow-alpha: 0.15;
  --glow: rgba(130, 80, 223, 0.4);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
}

nav .nav-left {
  font-size: 1rem;
  font-weight: 600;
}

nav .nav-left .brand {
  font-family: 'LowGravitasSymbols', monospace;
  color: var(--accent);
  margin-right: 6px;
}

nav .nav-right {
  display: flex;
  gap: 12px;
  align-items: center;
}

nav a {
  color: var(--text-dim);
  text-decoration: none;
  font-size: 14px;
}
nav a:hover { color: var(--accent); }

#theme-toggle {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  transition: border-color 0.15s;
  font-family: 'LowGravitasSymbols', monospace;
  color: var(--text);
}
#theme-toggle:hover { border-color: var(--accent); }

.toolbar {
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 57px;
  z-index: 9;
}

.toolbar-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}

.toolbar-hint {
  color: var(--text-dim);
  font-size: 12px;
  margin-top: 6px;
}

#search {
  flex: 1;
  min-width: 200px;
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px;
  outline: none;
}
#search:focus { border-color: var(--accent); }

#set-filter {
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  cursor: pointer;
}
#set-filter:focus { border-color: var(--accent); }

#count {
  color: var(--text-dim);
  font-size: 13px;
  white-space: nowrap;
}

#grid {
  position: relative;
  overflow-y: auto;
  padding: 12px 16px;
}

#container { position: relative; }

.card {
  position: absolute;
  width: var(--card-size);
  height: var(--card-size);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.2s;
  overflow: hidden;
  padding: 4px;
  user-select: none;
}

.card:hover {
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--glow);
}

.card.selected {
  border-color: var(--accent);
  box-shadow: inset 0 0 0 1px var(--accent);
}

.card .select-badge {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--toast-text);
  font-size: 10px;
  line-height: 16px;
  text-align: center;
  display: none;
}

.card.selected .select-badge { display: block; }

.card .glyph {
  font-family: 'LowGravitasSymbols', monospace;
  font-size: var(--glyph-size);
  line-height: 1;
  margin-bottom: 4px;
}

.card .name {
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
  line-height: 1.2;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding: 0 4px;
}

.card .set {
  font-size: 9px;
  color: var(--text-dim);
  opacity: 0.6;
  text-align: center;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding: 0 4px;
}

.card .cp {
  font-size: 10px;
  color: var(--accent);
  font-family: monospace;
}

.copy-menu {
  position: fixed;
  z-index: 50;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 0;
  min-width: 180px;
  box-shadow: 0 8px 24px rgba(0,0,0,var(--shadow-alpha));
}

.copy-menu button {
  display: flex;
  justify-content: space-between;
  width: 100%;
  padding: 8px 14px;
  background: none;
  border: none;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  text-align: left;
  gap: 12px;
}

.copy-menu button:hover { background: var(--border); }
.copy-menu button .label { color: var(--text-dim); font-size: 11px; }
.copy-menu .divider { height: 1px; background: var(--border); margin: 4px 0; }

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--accent);
  color: var(--toast-text);
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  opacity: 0;
  transition: transform 0.3s, opacity 0.3s;
  pointer-events: none;
  z-index: 100;
}

.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

#selection-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 20;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 10px 24px;
  display: none;
  box-shadow: 0 -4px 16px rgba(0,0,0,var(--shadow-alpha));
}

#selection-panel.visible {
  display: flex;
  align-items: center;
  gap: 12px;
}

#selection-panel .sel-icons {
  flex: 1;
  display: flex;
  gap: 4px;
  overflow-x: auto;
  font-family: 'LowGravitasSymbols', monospace;
  font-size: 20px;
  padding: 2px 0;
}

#selection-panel .sel-icon {
  cursor: pointer;
  padding: 2px 4px;
  border-radius: 4px;
  transition: background 0.15s;
  flex-shrink: 0;
}

#selection-panel .sel-icon:hover { background: var(--border); }

#selection-panel .sel-count {
  color: var(--text-dim);
  font-size: 13px;
  white-space: nowrap;
}

#selection-panel button {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: none;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: border-color 0.15s;
}

#selection-panel button:hover { border-color: var(--accent); }

#selection-panel button.primary {
  background: var(--accent);
  color: var(--toast-text);
  border-color: var(--accent);
}

#selection-panel button.primary:hover {
  background: var(--accent-hover);
  border-color: var(--accent-hover);
}

#loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--text-dim);
  font-size: 14px;
}

footer {
  border-top: 1px solid var(--border);
  padding: 16px 24px;
  text-align: center;
  color: var(--text-dim);
  font-size: 12px;
}
footer a { color: var(--text-dim); text-decoration: none; }
footer a:hover { color: var(--accent); }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-left" style="text-decoration:none;color:var(--text)"><span class="brand">&#xE900;</span> Low Gravitas Symbols</a>
  <div class="nav-right">
    <a href="index.html">Home</a>
    <a href="https://github.com/mikeabney/low-gravitas-symbol-font">GitHub</a>
    <button id="theme-toggle"></button>
  </div>
</nav>

<div class="toolbar">
  <div class="toolbar-row">
    <input id="search" type="text" placeholder="Search glyphs by name..." autocomplete="off">
    <select id="set-filter">
      <option value="">All Sets</option>
    </select>
    <span id="count"></span>
  </div>
  <div class="toolbar-hint">Click for copy options. Double-click to select for CSS export.</div>
</div>

<div id="grid">
  <div id="loading">Loading glyphs...</div>
  <div id="container"></div>
</div>

<div id="selection-panel">
  <span class="sel-count" id="sel-count"></span>
  <div class="sel-icons" id="sel-icons"></div>
  <button id="sel-clear">Clear</button>
  <button id="sel-download" class="primary">Download CSS</button>
</div>

<div class="toast" id="toast"></div>

<footer>
  &copy; 2026 <a href="https://github.com/mikeabney">Mike Abney</a>.
  Licensed under the <a href="https://github.com/mikeabney/low-gravitas-symbol-font/blob/main/LICENSE-FONT">SIL Open Font License</a>.
</footer>

<script>
(function() {
  // --- Theme toggle ---
  const themeBtn = document.getElementById('theme-toggle');
  let userTheme = sessionStorage.getItem('theme') || null;
  if (userTheme) document.documentElement.setAttribute('data-theme', userTheme);
  themeBtn.textContent = String.fromCodePoint(0xF050E); // theme-light-dark
  themeBtn.title = 'Toggle light/dark theme';

  function getTheme() {
    if (userTheme) return userTheme;
    return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }

  function applyTheme() {
    if (userTheme) document.documentElement.setAttribute('data-theme', userTheme);
    else document.documentElement.removeAttribute('data-theme');
  }

  themeBtn.addEventListener('click', () => {
    userTheme = getTheme() === 'dark' ? 'light' : 'dark';
    sessionStorage.setItem('theme', userTheme);
    applyTheme();
  });
  window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
    if (!userTheme) applyTheme();
  });

  // --- Grid ---
  const CARD_W = 136;
  const CARD_H = 136;
  const GAP = 6;

  let allGlyphs = [];
  let filtered = [];
  let cols = 1;
  let padLeft = 0;
  let visibleCards = new Map();
  let scrollRAF = null;
  const selected = new Map();

  const container = document.getElementById('container');
  const searchInput = document.getElementById('search');
  const setFilter = document.getElementById('set-filter');
  const countEl = document.getElementById('count');
  const toast = document.getElementById('toast');
  const loading = document.getElementById('loading');

  fetch('glyphs.json')
    .then(r => r.json())
    .then(data => {
      allGlyphs = data;
      loading.style.display = 'none';
      populateSets();
      // Apply set from URL query param if present
      const params = new URLSearchParams(window.location.search);
      const setParam = params.get('set');
      if (setParam && [...setFilter.options].some(o => o.value === setParam)) {
        setFilter.value = setParam;
      }
      applyFilter();
    })
    .catch(() => { loading.textContent = 'Failed to load glyphs.json'; });

  function populateSets() {
    const sets = new Set(allGlyphs.map(g => g.set));
    [...sets].sort().forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      setFilter.appendChild(opt);
    });
  }

  let debounceTimer;
  searchInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(applyFilter, 150);
  });
  setFilter.addEventListener('change', applyFilter);

  function applyFilter() {
    const query = searchInput.value.toLowerCase().trim();
    const set = setFilter.value;
    filtered = allGlyphs.filter(g => {
      if (set && g.set !== set) return false;
      if (query && !g.name.toLowerCase().includes(query)) return false;
      return true;
    });
    countEl.textContent = filtered.length.toLocaleString() + ' glyphs';
    layoutAndRender();
  }

  function layoutAndRender() {
    const gridWidth = container.clientWidth;
    cols = Math.max(1, Math.floor((gridWidth + GAP) / (CARD_W + GAP)));
    const usedWidth = cols * (CARD_W + GAP) - GAP;
    padLeft = Math.floor((gridWidth - usedWidth) / 2);
    const rows = Math.ceil(filtered.length / cols);
    container.style.height = (rows * (CARD_H + GAP) - GAP) + 'px';
    visibleCards.forEach(card => card.remove());
    visibleCards.clear();
    renderVisible();
  }

  function renderVisible() {
    const scrollTop = window.scrollY - container.offsetTop;
    const viewHeight = window.innerHeight;
    const buffer = CARD_H * 3;
    const startRow = Math.max(0, Math.floor((scrollTop - buffer) / (CARD_H + GAP)));
    const endRow = Math.min(Math.ceil(filtered.length / cols), Math.ceil((scrollTop + viewHeight + buffer) / (CARD_H + GAP)));
    const startIdx = startRow * cols;
    const endIdx = Math.min(endRow * cols, filtered.length);

    const toRemove = [];
    visibleCards.forEach((card, idx) => {
      if (idx < startIdx || idx >= endIdx) { card.remove(); toRemove.push(idx); }
    });
    toRemove.forEach(idx => visibleCards.delete(idx));

    for (let i = startIdx; i < endIdx; i++) {
      if (visibleCards.has(i)) continue;
      const g = filtered[i];
      const row = Math.floor(i / cols);
      const col = i % cols;

      const card = document.createElement('div');
      card.className = 'card' + (selected.has(g.cp) ? ' selected' : '');
      card.style.left = padLeft + col * (CARD_W + GAP) + 'px';
      card.style.top = row * (CARD_H + GAP) + 'px';
      card.style.width = CARD_W + 'px';
      card.style.height = CARD_H + 'px';
      card.dataset.cp = g.cp;

      const charStr = String.fromCodePoint(g.cp);
      card.innerHTML =
        '<span class="select-badge">\u2713</span>' +
        '<span class="glyph">' + charStr + '</span>' +
        '<span class="name" title="' + escAttr(g.name) + '">' + esc(g.name) + '</span>' +
        '<span class="set">' + esc(g.set) + '</span>' +
        '<span class="cp">U+' + g.hex + '</span>';

      card.addEventListener('click', (e) => showCopyMenu(e, g, charStr));
      card.addEventListener('dblclick', (e) => {
        e.preventDefault();
        closeCopyMenu();
        toggleSelection(g);
      });

      container.appendChild(card);
      visibleCards.set(i, card);
    }
  }

  function escAttr(s) { return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
  function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;'); }

  // --- Copy menu ---
  let activeMenu = null;
  let clickTimer = null;

  function closeCopyMenu() {
    if (activeMenu) { activeMenu.remove(); activeMenu = null; }
  }

  document.addEventListener('click', (e) => {
    if (activeMenu && !activeMenu.contains(e.target)) closeCopyMenu();
  });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeCopyMenu(); });

  function showCopyMenu(e, g, charStr) {
    // Delay to distinguish from double-click
    if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; return; }
    clickTimer = setTimeout(() => {
      clickTimer = null;
      _openCopyMenu(e, g, charStr);
    }, 200);
  }

  function _openCopyMenu(e, g, charStr) {
    e.stopPropagation();
    closeCopyMenu();

    const utfEscape = g.cp <= 0xFFFF
      ? '\\u' + g.hex.padStart(4, '0')
      : '\\u{' + g.hex + '}';
    const cssClass = g['class'] || '';
    const isSelected = selected.has(g.cp);
    const selLabel = isSelected ? 'Remove from selection' : 'Add to selection';

    const menu = document.createElement('div');
    menu.className = 'copy-menu';
    menu.innerHTML =
      '<button data-val="' + escAttr(charStr) + '"><span>Symbol</span><span class="label" style="font-family:LowGravitasSymbols,monospace;font-size:16px">' + charStr + '</span></button>' +
      '<button data-val="U+' + g.hex + '"><span>Codepoint</span><span class="label">U+' + g.hex + '</span></button>' +
      '<button data-val="' + escAttr(utfEscape) + '"><span>UTF escape</span><span class="label">' + esc(utfEscape) + '</span></button>' +
      (cssClass ? '<button data-val="' + escAttr(cssClass) + '"><span>CSS class</span><span class="label">' + esc(cssClass) + '</span></button>' : '') +
      '<div class="divider"></div>' +
      '<button data-action="select"><span>' + selLabel + '</span></button>';

    menu.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', async (ev) => {
        ev.stopPropagation();
        if (btn.dataset.action === 'select') {
          toggleSelection(g);
          closeCopyMenu();
          return;
        }
        const val = btn.getAttribute('data-val');
        try {
          await navigator.clipboard.writeText(val);
          showToast('Copied: ' + val);
        } catch {
          showToast(val);
        }
        closeCopyMenu();
      });
    });

    document.body.appendChild(menu);
    activeMenu = menu;

    const mx = Math.min(e.clientX, window.innerWidth - menu.offsetWidth - 8);
    const my = Math.min(e.clientY, window.innerHeight - menu.offsetHeight - 8);
    menu.style.left = Math.max(0, mx) + 'px';
    menu.style.top = Math.max(0, my) + 'px';
  }

  // --- Toast ---
  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
  }

  // --- Selection management ---
  const selPanel = document.getElementById('selection-panel');
  const selIcons = document.getElementById('sel-icons');
  const selCount = document.getElementById('sel-count');
  const selClear = document.getElementById('sel-clear');
  const selDownload = document.getElementById('sel-download');

  function toggleSelection(g) {
    if (selected.has(g.cp)) {
      selected.delete(g.cp);
    } else {
      selected.set(g.cp, g);
    }
    updateSelectionUI();
    visibleCards.forEach((card) => {
      const cp = parseInt(card.dataset.cp);
      card.classList.toggle('selected', selected.has(cp));
    });
  }

  function updateSelectionUI() {
    if (selected.size === 0) {
      selPanel.classList.remove('visible');
      return;
    }
    selPanel.classList.add('visible');
    selCount.textContent = selected.size + ' selected';
    selIcons.innerHTML = '';
    for (const [cp, g] of selected) {
      const span = document.createElement('span');
      span.className = 'sel-icon';
      span.textContent = String.fromCodePoint(cp);
      span.title = g.name + ' (click to remove)';
      span.addEventListener('click', () => {
        selected.delete(cp);
        updateSelectionUI();
        visibleCards.forEach((card) => {
          if (parseInt(card.dataset.cp) === cp) card.classList.remove('selected');
        });
      });
      selIcons.appendChild(span);
    }
  }

  selClear.addEventListener('click', () => {
    selected.clear();
    updateSelectionUI();
    visibleCards.forEach((card) => card.classList.remove('selected'));
  });

  selDownload.addEventListener('click', () => {
    const lines = [
      "@font-face {",
      "  font-family: 'LowGravitasSymbols';",
      "  src: url('LowGravitasSymbols.ttf') format('truetype');",
      "  font-display: swap;",
      "}",
      "",
      "[class^='lg-'],",
      "[class*=' lg-'] {",
      "  font-family: 'LowGravitasSymbols';",
      "  font-style: normal;",
      "  font-weight: normal;",
      "  font-variant: normal;",
      "  text-transform: none;",
      "  line-height: 1;",
      "  -webkit-font-smoothing: antialiased;",
      "  -moz-osx-font-smoothing: grayscale;",
      "}",
      "",
    ];
    const sorted = [...selected.values()].sort((a, b) => a.cp - b.cp);
    for (const g of sorted) {
      const esc = g.cp <= 0xFFFF
        ? '\\' + g.hex.padStart(4, '0')
        : '\\' + g.hex.padStart(5, '0');
      lines.push('.' + g['class'] + '::before { content: "' + esc + '"; }');
    }
    const blob = new Blob([lines.join('\n') + '\n'], { type: 'text/css' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'low-gravitas-symbols.css';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Downloaded CSS with ' + selected.size + ' icons');
  });

  // --- Scroll & resize ---
  window.addEventListener('scroll', () => {
    if (scrollRAF) return;
    scrollRAF = requestAnimationFrame(() => { renderVisible(); scrollRAF = null; });
  });

  window.addEventListener('resize', () => { layoutAndRender(); });
})();
</script>

</body>
</html>
